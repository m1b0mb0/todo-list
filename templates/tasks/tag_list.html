{% extends "base.html" %}

{% block content %}
  <h1>Tags
    <a href="{% url 'tasks:tag-create' %}" class="btn btn-primary link-to-page">Add</a>
  </h1>

  {% if tag_list %}
    <br>
    <ul>
      {% for tag in tag_list %}
        <li>
          {{ tag.name }}
        </li>
      {% endfor %}
    </ul>
  {% else %}
      <p>There are no tags.</p>
  {% endif %}
{% endblock %}
